<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A97D"/>
      <stop offset="50%" stop-color="#D4BC94"/>
      <stop offset="100%" stop-color="#B89A6E"/>
    </linearGradient>
  </defs>
  
  <!-- Warm linen background circle -->
  <circle cx="256" cy="256" r="240" fill="#F5F0EB"/>
  
  <!-- Subtle border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#EDE6DB" stroke-width="2"/>
  
  <!-- The C letterform -->
  <text
    x="256"
    y="310"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Georgia', serif"
    font-weight="400"
    font-size="280"
    fill="#2A2420"
  >C</text>
  
  <!-- Golden accent dot — like a period or a wax seal detail -->
  <circle cx="340" cy="340" r="12" fill="url(#goldSheen)" opacity="0.7"/>
</svg>
