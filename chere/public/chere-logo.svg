<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <!-- Subtle gold gradient for accent elements -->
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A97D"/>
      <stop offset="50%" stop-color="#D4BC94"/>
      <stop offset="100%" stop-color="#B89A6E"/>
    </linearGradient>
    
    <!-- Very subtle texture overlay -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Background (transparent for versatility) -->
  
  <!-- Main wordmark: Chère -->
  <!-- Using a refined serif style evocative of Cormorant Garamond / Didot -->
  <text
    x="400"
    y="165"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Georgia', serif"
    font-weight="400"
    font-size="120"
    letter-spacing="8"
    fill="#2A2420"
  >Chère</text>
  
  <!-- Thin decorative line beneath — the golden thread -->
  <line
    x1="310"
    y1="195"
    x2="490"
    y2="195"
    stroke="url(#goldSheen)"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.6"
  />
  
  <!-- Tagline (optional — can be removed for compact usage) -->
  <text
    x="400"
    y="235"
    text-anchor="middle"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-weight="300"
    font-size="14"
    letter-spacing="5"
    fill="#8A817A"
    text-transform="uppercase"
  >TURN YOUR LOVE INTO SOMETHING THEY CAN OPEN</text>
</svg>
